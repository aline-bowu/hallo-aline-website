<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aline — bald online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Piazzolla:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
--ink:oklch(23% 0.02 50);
--bg:oklch(96.5% 0.015 80);
--cream:oklch(98.5% 0.008 80);
--accent:oklch(56% 0.13 145);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
min-height:100vh;
background:var(--bg);
color:var(--ink);
font-family:'IBM Plex Sans',sans-serif;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
}
.card{max-width:480px; text-align:center;}
.logo{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:36px;}
.logo-mark{width:38px; height:38px; border-radius:50%; background:var(--ink); position:relative; flex-shrink:0;}
.logo-wordmark{font-family:'Piazzolla',serif; font-weight:500; font-size:26px;}
.eyebrow{
font-family:'IBM Plex Mono',monospace; font-size:12.5px; letter-spacing:0.07em;
text-transform:uppercase; color:oklch(46% 0.1 145); background:oklch(93% 0.04 145);
display:inline-block; padding:6px 14px; border-radius:20px; margin-bottom:22px;
}
h1{
font-family:'Piazzolla',serif; font-weight:500; font-size:clamp(28px,6vw,40px);
line-height:1.15;
}
h1 .accent{color:var(--accent); font-style:italic;}
p{margin-top:18px; font-size:16.5px; color:oklch(48% 0.02 50); line-height:1.6;}
.dots{margin-top:38px; display:flex; gap:8px; justify-content:center;}
.dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:0.25;animation:pulse 1.4s infinite ease-in-out;}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,80%,100%{opacity:0.25; transform:scale(1);} 40%{opacity:1; transform:scale(1.3);}}
@media (prefers-reduced-motion: reduce){ .dots span{animation:none; opacity:0.6;} }
</style>
</head>
<body>
<div class="card">
<div class="logo">
<div class="logo-mark">
<svg viewBox="0 0 34 34" width="34" height="34" style="position:absolute;inset:0;">
<polyline points="6,25 13,14 19,21 26,11" fill="none" stroke="oklch(98.5% 0.008 80)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
<circle cx="26" cy="11" r="2.6" fill="oklch(56% 0.13 145)"></circle>
</svg>
</div>
<div class="logo-wordmark">aline</div>
</div>
<span class="eyebrow">Für Berner Betriebe</span>
<h1>Hier entsteht gerade <span class="accent">etwas Neues.</span></h1>
<p>Von Berner KMU für Berner KMU. Wir sind noch mitten in der Vorbereitung — schau bald wieder vorbei.</p>
<div class="dots"><span></span><span></span><span></span></div>
</div>
</body>
</html>
