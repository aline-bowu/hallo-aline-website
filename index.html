<!DOCTYPE html>
  <html lang="de-CH">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aline — bald online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#14181c;
    --paper:#faf9f6;
          --blue:#2f4bff;
    --blue-deep:#1c2f9e;
}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
        min-height:100vh;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
}
  .card{
        max-width:480px;
    text-align:center;
}
  .logo{
        font-family:'Archivo',sans-serif; font-weight:900; font-size:26px;
    display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:36px;
}
  .logo-dot{width:10px;height:10px;background:var(--blue);border-radius:2px; display:inline-block;}
  .eyebrow{
        font-family:'IBM Plex Mono',monospace; font-size:12.5px; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--blue-deep); background:#e8ecff;
        display:inline-block; padding:6px 14px; border-radius:20px; margin-bottom:22px;
}
  h1{
        font-family:'Archivo',sans-serif; font-weight:900; font-size:clamp(28px,6vw,40px);
    line-height:1.1; letter-spacing:-0.02em;
}
  h1 .accent{color:var(--blue);}
  p{
        margin-top:18px; font-size:16.5px; color:#4a4f55; line-height:1.6;
}
  .dots{
        margin-top:38px; display:flex; gap:8px; justify-content:center;
}
  .dots span{
        width:8px;height:8px;border-radius:50%;background:var(--blue);opacity:0.25;
    animation:pulse 1.4s infinite ease-in-out;
  }
  .dots span:nth-child(2){animation-delay:0.2s;}
  .dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{
        0%,80%,100%{opacity:0.25; transform:scale(1);}
    40%{opacity:1; transform:scale(1.3);}
  }
  @media (prefers-reduced-motion: reduce){
    .dots span{animation:none; opacity:0.6;}
  }
</style>
  </head>
  <body>
    <div class="card">
      <div class="logo"><span class="logo-dot"></span>aline</div>
      <span class="eyebrow">Kanton Bern</span>
      <h1>Hier entsteht gerade <span class="accent">etwas Neues.</span></h1>
    <p>Von Berner KMU für Berner KMU. Wir sind noch mitten in der Vorbereitung — schau bald wieder vorbei.</p>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </body>
  </html>
